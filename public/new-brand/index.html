    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding)

        .replaceAll('_', '/');

      const rawData = window.atob(base64);
      const outputArray = new Uint8Array(rawData.length);

        outputArray[i] = rawData.charCodeAt(i);
      }

      return outputArray;
    }

    function getLatestSyncTime(comments) {
      let latest = null;

      comments.forEach(c => {

          c.scrapedAt,
          c.updatedAt,
          c.deletedAt
        ];

        candidates.forEach(value => {
          const time = parseTime(value);

          if (time && (!latest || time > latest)) {
            latest = time;
          }
        });
      });

      return latest;
    }

    function formatRelativeTime(time) {
      if (!time) return '?иҠ°о·Ғ';

      const diffMs = Date.now() - time;
      const diffMinutes = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMinutes / 60);
      const diffDays = Math.floor(diffHours / 24);

      if (diffMinutes < 1) return '?о®Қ?';
      if (diffMinutes < 60) return `${diffMinutes} ?пүҗ??пҳҙ;
      if (diffHours < 24) return `${diffHours} ж’ оҗІ??пҳҙ;
      if (diffDays < 30) return `${diffDays} жҶӯжӢҷ?`;

      return 'й һпҶі? 30 жҶӯжӢҷ?';
    }

    function formatFullTime(time) {

      return new Date(time).toLocaleString('zh-TW', {

        day: 'numeric',

    function getTimeWeight(dateStr) {
      if (!dateStr || dateStr === '?иҠ°о·Ғ?оҝң?') return Number.MAX_SAFE_INTEGER;

      const text = String(dateStr).toLowerCase().trim();
      const cleanText = text.replace(/йҠқп“Ғжҙ»иқәеҲ»ж‘©[:еҡ—оӘҠ?\s*/g, '').trim();

      const now = new Date();
      const hoursSince = date => Math.max(0, (now - date) / 3600000);

      const relativeMatch = cleanText.match(/(\d+)/);
      const num = relativeMatch ? Number(relativeMatch[1]) : 1;

      if (/?о®Қ?|just now/.test(cleanText)) return 0.01;
      if (/?пүҗ?|???!??|minute|minutes|mins|m ago/.test(cleanText)) return Math.max(1 / 60, num / 60);
      if (/ж’ оҗІ?|hour|hours|h(?![a-z])/i.test(cleanText)) return num;
      if (/жҶӯе°ҡday|days|d ago/.test(cleanText)) return num * 24;
      if (/?жӮҙweek|weeks|w ago/.test(cleanText)) return num * 24 * 7;
      if (/?п•һ?|month|months|mo ago/.test(cleanText)) return num * 24 * 30;
      if (/ж’ҹжҸүyear|years|y ago/.test(cleanText)) return num * 24 * 365;

      const fullDate = cleanText.match(/(\d{4})ж’ҹе»„s*(\d{1,2})?пҢҹs*(\d{1,2})??);

      if (fullDate) {
        const d = new Date(Number(fullDate[1]), Number(fullDate[2]) - 1, Number(fullDate[3]));
        return hoursSince(d);
      }

      const shortDate = cleanText.match(/(\d{1,2})?пҢҹs*(\d{1,2})??);

      if (shortDate) {
        let d = new Date(now.getFullYear(), Number(shortDate[1]) - 1, Number(shortDate[2]));

        if (d > now) {
          d = new Date(now.getFullYear() - 1, Number(shortDate[1]) - 1, Number(shortDate[2]));
        }

        return hoursSince(d);
      }

      const isoDate = cleanText.match(/(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);

      if (isoDate) {
        const d = new Date(Number(isoDate[1]), Number(isoDate[2]) - 1, Number(isoDate[3]));
        return hoursSince(d);
      }

      return Number.MAX_SAFE_INTEGER;
    }

            getReplyText(c),
            getReplyDate(c),
            getDisplayBrand(c),
            getDisplayStore(c)
          ].filter(Boolean).join(' ').toLowerCase();

          return searchText.includes(keyword);
        });
      }

      if (historyFilter === 'edited') {
        displayData = displayData.filter(c => isEditedReview(c) && isNotDeletedReview(c));
      } else if (historyFilter === 'hasVersions') {
        displayData = displayData.filter(c => hasVersions(c) && isNotDeletedReview(c));
      } else if (historyFilter === 'deleted') {

          : hasOwnerReply(c)
            ? `<span class="ml-2 text-xs px-2 py-1 rounded bg-blue-100 text-blue-700">ж’Ңи„Ј?й–¬?/span>`
            : `<span class="ml-2 text-xs px-2 py-1 rounded bg-red-100 text-red-700">?иҠё?й–¬?/span>`;

        const updatedText = c.updatedAt
          ? `<div class="text-xs text-slate-400 mt-2">йһҲпӢӘ??ж№”оЎҮеҡ—?{escapeHTML(c.updatedAt)}</div>`
          : '';

        const storeText = `
          <div class="text-xs text-slate-400 mt-2">
            ?ојҪ?еҡ—?{escapeHTML(getDisplayBrand(c))}еҡҡо°Ә??дјҗ?${escapeHTML(getDisplayStore(c))}
          </div>
        `;

        const cardStyle = isDeletedReview(c)
          ? 'bg-white opacity-60 border-l-4 border-zinc-400'
          : isReadReview(c)
            ? 'bg-white opacity-80 border-l-4 border-slate-200'
            : 'bg-white border-l-4 border-red-400';

        return `
          <div id="card-${escapeHTML(c.id || c.reviewId)}" class="${cardStyle} p-5 rounded shadow hover:border-amber-500 transition-all">
            <div class="flex justify-between items-start gap-4">
              <div>
                <span class="text-amber-500 font-bold">${escapeHTML(c.rating || 0)} ??/span>
                ${readBadge}
                ${replyBadge}
                ${deletedBadge}
                ${editedBadge}
                ${versionBadge}
              </div>

              <span class="text-xs text-slate-400">${escapeHTML(c.date || '?иҠ°о·Ғ?оҝң?')}</span>
            </div>

            ${c.author ? `<div class="text-sm text-slate-500 mt-2">йӣҝо°ӯВҖпҶ№?${escapeHTML(c.author)}</div>` : ''}
            ${storeText}

            <p class="text-slate-700 mt-3 whitespace-pre-wrap">${escapeHTML(c.content || '?вҲӘп…ұж‘°?)}</p>

            ${updatedText}
            ${renderDeletedInfo(c)}

            <div class="mt-4 pt-3 border-t flex flex-wrap gap-2 justify-end">
              ${renderHistoryButton(c)}
              ${renderReplyButton(c)}
              ${renderReadButton(c)}
            </div>
          </div>
        `;
      }).join('');
    }

    async function openHistoryDialog(encodedKey) {
      const key = decodeURIComponent(encodedKey);
      const dialog = document.getElementById('historyDialog');
      const content = document.getElementById('historyContent');

      const current = rawData.find(c => {
        return getReviewKey(c) === key || String(c.id || '') === key;
      });

      content.innerHTML = `
        <div class="text-slate-500">
          з”Ү?оҜӯйңҲВҖ?оўҖ?ж•әВҖиққВҖ??..
        </div>
      `;

      dialog.showModal();

      const versions = getVersionListByKey(key);

      const currentBlock = current ? `
        <div class="border rounded p-4 bg-amber-50 border-amber-200">
          <div class="flex justify-between items-center mb-2">
            <div class="font-bold text-amber-700">?жЎҖ??пҺҮоҜұ</div>
            <div class="text-xs text-slate-500">${escapeHTML(current.date || '?иҠ°о·Ғ?оҝң?')}</div>
          </div>

          <div class="text-sm text-slate-600 mb-2">
            ${escapeHTML(current.rating || 0)} ??
          </div>

          <div class="whitespace-pre-wrap text-slate-800">
            ${escapeHTML(current.content || '?вҲӘп…ұж‘°?)}
          </div>
        </div>
      ` : `
        <div class="border rounded p-4 bg-amber-50 border-amber-200">
          ?жӣҶ??е•Ғоӯ–?пҡҷ??зҘҲ??о©‘ВҖ?
        </div>
      `;

      const oldBlocks = versions.length > 0
        ? versions.map((v, idx) => `
          <div class="border rounded p-4 bg-white">
            <div class="flex justify-between items-center mb-2">
              <div class="font-bold text-slate-700">?п“Ӯ???${idx + 1}</div>
              <div class="text-xs text-slate-400">
                йӢЎжҖ ?йҡһ???оҡҜ?${escapeHTML(v.replacedAt || v.savedAt || '?иҠ°о·Ғ')}
              </div>
            </div>

            ${v.author ? `<div class="text-xs text-slate-400 mb-2">йӣҝо°ӯВҖпҶ№?${escapeHTML(v.author)}</div>` : ''}

            <div class="text-xs text-slate-400 mb-2">
              ?оё„?йҡўоЎҪ??оҡҜ?${escapeHTML(v.date || '?иҠ°о·Ғ?оҝң?')}
            </div>

            <div class="text-sm text-slate-600 mb-2">
              ${escapeHTML(v.rating || 0)} ??
            </div>

            <div class="whitespace-pre-wrap text-slate-700">
              ${escapeHTML(v.content || '?вҲӘп…ұж‘°?)}
            </div>

            ${v.reason ? `<div class="text-xs text-slate-400 mt-2">?оёҒ?еҡ—?{escapeHTML(v.reason)}</div>` : ''}
          </div>
        `).join('')
        : `
          <div class="border rounded p-4 bg-slate-50 text-slate-600 leading-7">
            ?жЎҖ??п„“??пҗў?ж‘®оҰ¶пҚ‘?п“Ӯ??з ”ВҖ?br>
            жҶ’оҝҷ??о©•??иҠЈоҰҖ Google жҶҝиҲҗе…§?п—әжӯҮиқәеҲ»ж‘©?пҡЎ?йӣҝпүӢ??оёғоң…?пҺҮоҜұиққВҖ?п„’?зҳқоҳү?йқҪоіҮ??оҺ—??жү№жҚҶеҡ—п—әеҒңйҠқпҡҳ??пҗ§?ж•әВҖиққВҖ?п„җВҖ?br>
            ж•әоөҰоҗҠ?еҲё?жҶӘп•§??иҠҫ??п—№???reviewId ?п„•?йҡўоЎјп…ұж‘°еҜһ??оёғ?йҠӢп•қ??пҡҡ??оҹ©??п“Җп…ұж‘°еӯөеҒң?пҒөпҠҫ?жӣүоҜӯ?о©–г„җ??
          </div>
        `;

      content.innerHTML = `
        ${current && current.author ? `<div class="text-sm text-slate-500">йӣҝо°ӯВҖпҶ№?${escapeHTML(current.author)}</div>` : ''}
        ${currentBlock}

        <div class="font-bold text-slate-800 pt-2">
          з”Үз‘•оҸҫ?пҺҮоҜұ
        </div>

        ${oldBlocks}
      `;
    }

    function closeHistoryDialog() {
      const dialog = document.getElementById('historyDialog');

      if (dialog.open) {
        dialog.close();
      }
    }

    loadSidebarState();
    renderSidebar();
    updateDashboardTitle();
    updateSyncButtonVisibility();

    registerServiceWorker().then(() => {
      updateNotificationToggleButton();
    });

    loadData();
  </script>
</body>
