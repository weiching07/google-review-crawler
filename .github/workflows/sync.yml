name: Sync Google Reviews

on:
  workflow_dispatch:
    inputs:
      scrape_rounds:
        description: "評論滑動輪數，5=快速同步，999=完整同步"
        required: false
        default: "5"

  schedule:
    # 每 10 分鐘快速同步，等於左邊按鈕
    - cron: "*/10 * * * *"

    # 每天台灣時間凌晨 3 點完整同步，等於右邊按鈕
    # GitHub Actions cron 使用 UTC，UTC 19:00 = 台灣 03:00
    - cron: "0 19 * * *"

  push:
    branches:
      - main
    paths-ignore:
      - "public/comments.json"
      - "public/review-versions.json"
      - "public/notified-review-ids.json"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-dependencies: true

      - name: Check Chrome path
        run: |
          echo "Chrome path: ${{ steps.setup-chrome.outputs.chrome-path }}"
          "${{ steps.setup-chrome.outputs.chrome-path }}" --version

      - name: Install dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
        run: |
          npm install --ignore-scripts

      - name: Decide scrape rounds
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "SCRAPE_MAX_ROUNDS=${{ github.event.inputs.scrape_rounds || '5' }}" >> $GITHUB_ENV
            echo "Manual sync rounds: ${{ github.event.inputs.scrape_rounds || '5' }}"
          elif [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "0 19 * * *" ]; then
            echo "SCRAPE_MAX_ROUNDS=999" >> $GITHUB_ENV
            echo "Daily full sync rounds: 999"
          else
            echo "SCRAPE_MAX_ROUNDS=5" >> $GITHUB_ENV
            echo "Fast sync rounds: 5"
          fi

      - name: Sync Google reviews
        run: npm run sync:static
        env:
          NODE_ENV: production
          PUPPETEER_SKIP_DOWNLOAD: true
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          SCRAPE_MAX_ROUNDS: ${{ env.SCRAPE_MAX_ROUNDS }}

      - name: Send push notifications
        run: npm run notify:push
        env:
          WORKER_URL: https://dry-butterfly-33.zxcvb2282.workers.dev
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: mailto:zxcvb282@gmail.com

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          mkdir -p public
          test -f public/comments.json || printf '[]\n' > public/comments.json
          test -f public/review-versions.json || printf '[]\n' > public/review-versions.json
          test -f public/notified-review-ids.json || printf '[]\n' > public/notified-review-ids.json

          cp public/comments.json /tmp/comments.json
          cp public/review-versions.json /tmp/review-versions.json
          cp public/notified-review-ids.json /tmp/notified-review-ids.json

          git fetch origin main
          git reset --hard origin/main

          mkdir -p public
          cp /tmp/comments.json public/comments.json
          cp /tmp/review-versions.json public/review-versions.json
          cp /tmp/notified-review-ids.json public/notified-review-ids.json

          git add public/comments.json public/review-versions.json public/notified-review-ids.json

          if git diff --cached --quiet; then
            echo "No JSON changes to commit"
          else
            git commit -m "auto sync reviews"
            git push origin HEAD:main
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4