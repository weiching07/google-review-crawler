name: Sync Google Reviews

on:
  workflow_dispatch:
    inputs:
      group:
        description: "資料群組"
        required: false
        default: "new-brand"
        type: choice
        options:
          - new-brand
          - TGIF
          - TXRH

      scrape_rounds:
        description: "評論滑動輪數"
        required: false
        default: "5"

      brand:
        description: "品牌"
        required: false
        default: "all"

      store:
        description: "店別"
        required: false
        default: "all"

  schedule:
    - cron: "3 * * * *"    # new-brand，每小時 03 分
    - cron: "23 * * * *"   # TGIF，每小時 23 分
    - cron: "43 * * * *"   # TXRH，每小時 43 分

  push:
    branches:
      - main
    paths-ignore:
      - "public/comments.json"
      - "public/review-versions.json"
      - "public/notified-review-ids.json"

      - "public/new-brand/comments.json"
      - "public/new-brand/review-versions.json"
      - "public/new-brand/notified-review-ids.json"

      - "public/TGIF/comments.json"
      - "public/TGIF/review-versions.json"
      - "public/TGIF/notified-review-ids.json"

      - "public/TXRH/comments.json"
      - "public/TXRH/review-versions.json"
      - "public/TXRH/notified-review-ids.json"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-dependencies: true

      - name: Check Chrome path
        run: |
          echo "Chrome path: ${{ steps.setup-chrome.outputs.chrome-path }}"
          "${{ steps.setup-chrome.outputs.chrome-path }}" --version

      - name: Install dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
        run: |
          npm install --ignore-scripts

      # =========================
      # 手動同步
      # =========================
      - name: Prepare manual group JSON
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          GROUP="${{ github.event.inputs.group || 'new-brand' }}"

          case "$GROUP" in
            new-brand|TGIF|TXRH)
              ;;
            *)
              GROUP="new-brand"
              ;;
          esac

          echo "DASHBOARD_GROUP=$GROUP" >> "$GITHUB_ENV"
          echo "Using manual dashboard group: $GROUP"

          mkdir -p public
          mkdir -p "public/$GROUP"

          test -f "public/$GROUP/comments.json" || printf '[]\n' > "public/$GROUP/comments.json"
          test -f "public/$GROUP/review-versions.json" || printf '[]\n' > "public/$GROUP/review-versions.json"
          test -f "public/$GROUP/notified-review-ids.json" || printf '[]\n' > "public/$GROUP/notified-review-ids.json"

          cp "public/$GROUP/comments.json" public/comments.json
          cp "public/$GROUP/review-versions.json" public/review-versions.json
          cp "public/$GROUP/notified-review-ids.json" public/notified-review-ids.json

      - name: Manual sync Google reviews
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: npm run sync:static
        env:
          NODE_ENV: production
          PUPPETEER_SKIP_DOWNLOAD: true
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          SCRAPE_MAX_ROUNDS: ${{ github.event.inputs.scrape_rounds || '5' }}
          SCRAPE_TARGET_BRAND: ${{ github.event.inputs.brand || 'all' }}
          SCRAPE_TARGET_STORE: ${{ github.event.inputs.store || 'all' }}

      # =========================
      # 完整同步通知基準
      #
      # 完整同步 999：
      # 1. 不寄信
      # 2. 不推播
      # 3. 將該次同步範圍內已存在的評論 ID
      #    靜默補進 notified-review-ids.json
      #
      # 避免下一次排程把完整同步抓到的舊評論
      # 誤判成新評論再次寄出
      # =========================
      - name: Baseline notified IDs after full sync
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.scrape_rounds == '999' }}
        env:
          SCRAPE_TARGET_STORE: ${{ github.event.inputs.store || 'all' }}
        run: |
          node <<'NODE'
          const fs = require('fs');

          const commentsPath = 'public/comments.json';
          const notifiedPath = 'public/notified-review-ids.json';

          function readArray(filePath) {
            try {
              if (!fs.existsSync(filePath)) {
                return [];
              }

              const parsed = JSON.parse(
                fs.readFileSync(filePath, 'utf8')
              );

              return Array.isArray(parsed)
                ? parsed
                : [];
            } catch (error) {
              console.error(
                `讀取 ${filePath} 失敗：${error.message}`
              );

              process.exit(1);
            }
          }

          function normalize(value) {
            return String(value ?? '').trim();
          }

          function getReviewId(review) {
            return normalize(
              review?.reviewId ||
              review?.id ||
              ''
            );
          }

          function getReviewStore(review) {
            return normalize(
              review?.store ||
              review?.storeName ||
              review?.location ||
              review?.shop ||
              review?.branchStore ||
              ''
            );
          }

          const comments = readArray(commentsPath);
          const oldNotifiedIds = readArray(notifiedPath);

          const targetStore = normalize(
            process.env.SCRAPE_TARGET_STORE || 'all'
          );

          const notifiedSet = new Set(
            oldNotifiedIds
              .map(normalize)
              .filter(Boolean)
          );

          let matchedCount = 0;
          let addedCount = 0;
          let skippedWithoutId = 0;

          for (const review of comments) {
            if (!review || review.isDeleted === true) {
              continue;
            }

            const reviewStore = getReviewStore(review);

            const matchesTargetStore =
              targetStore === 'all' ||
              reviewStore === targetStore;

            if (!matchesTargetStore) {
              continue;
            }

            matchedCount++;

            const reviewId = getReviewId(review);

            if (!reviewId) {
              skippedWithoutId++;
              continue;
            }

            if (!notifiedSet.has(reviewId)) {
              notifiedSet.add(reviewId);
              addedCount++;
            }
          }

          fs.writeFileSync(
            notifiedPath,
            JSON.stringify(
              Array.from(notifiedSet),
              null,
              2
            ) + '\n',
            'utf8'
          );

          console.log('完整同步通知基準更新完成');
          console.log(`完整同步店別：${targetStore}`);
          console.log(`符合範圍評論數：${matchedCount}`);
          console.log(`原本已通知 ID 數：${oldNotifiedIds.length}`);
          console.log(`本次靜默補入 ID 數：${addedCount}`);
          console.log(`缺少評論 ID 數：${skippedWithoutId}`);
          console.log(`更新後已通知 ID 數：${notifiedSet.size}`);
          console.log('完整同步不寄信、不推播');
          NODE

      # 只有快速同步 scrape_rounds=5 才寄信與推播
      # 完整同步 scrape_rounds=999 會跳過這個步驟
      - name: Manual send notifications
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.scrape_rounds == '5' }}
        run: npm run notify:push
        env:
          DASHBOARD_GROUP: ${{ env.DASHBOARD_GROUP }}
          SCRAPE_MAX_ROUNDS: ${{ github.event.inputs.scrape_rounds || '5' }}

          WORKER_URL: https://dry-butterfly-33.zxcvb2282.workers.dev
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: mailto:zxcvb282@gmail.com

          O365_SMTP_HOST: ${{ secrets.O365_SMTP_HOST }}
          O365_SMTP_PORT: ${{ secrets.O365_SMTP_PORT }}
          O365_SMTP_USER: ${{ secrets.O365_SMTP_USER }}
          O365_SMTP_PASS: ${{ secrets.O365_SMTP_PASS }}

          O365_NOTIFY_TO: ${{ secrets.O365_NOTIFY_TO }}
          O365_NOTIFY_TO_NEW_BRAND: ${{ secrets.O365_NOTIFY_TO_NEW_BRAND }}
          O365_NOTIFY_TO_TGIF: ${{ secrets.O365_NOTIFY_TO_TGIF }}
          O365_NOTIFY_TO_TXRH: ${{ secrets.O365_NOTIFY_TO_TXRH }}

      - name: Commit manual updated JSON
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          GROUP="${DASHBOARD_GROUP:-new-brand}"

          case "$GROUP" in
            new-brand|TGIF|TXRH)
              ;;
            *)
              GROUP="new-brand"
              ;;
          esac

          echo "Commit manual dashboard group: $GROUP"

          mkdir -p public
          test -f public/comments.json || printf '[]\n' > public/comments.json
          test -f public/review-versions.json || printf '[]\n' > public/review-versions.json
          test -f public/notified-review-ids.json || printf '[]\n' > public/notified-review-ids.json

          cp public/comments.json /tmp/comments.json
          cp public/review-versions.json /tmp/review-versions.json
          cp public/notified-review-ids.json /tmp/notified-review-ids.json

          git fetch origin main
          git reset --hard origin/main

          mkdir -p "public/$GROUP"

          cp /tmp/comments.json "public/$GROUP/comments.json"
          cp /tmp/review-versions.json "public/$GROUP/review-versions.json"
          cp /tmp/notified-review-ids.json "public/$GROUP/notified-review-ids.json"

          git add \
            "public/$GROUP/comments.json" \
            "public/$GROUP/review-versions.json" \
            "public/$GROUP/notified-review-ids.json"

          if git diff --cached --quiet; then
            echo "No manual JSON changes to commit"
          else
            git commit -m "auto sync reviews for $GROUP"
            git push origin HEAD:main
          fi

      # =========================
      # 排程同步：每小時三組分開跑
      # 03 分 new-brand
      # 23 分 TGIF
      # 43 分 TXRH
      # =========================
      - name: Prepare scheduled group JSON
        if: ${{ github.event_name == 'schedule' }}
        run: |
          EVENT_SCHEDULE="${{ github.event.schedule }}"

          case "$EVENT_SCHEDULE" in
            "3 * * * *")
              GROUP="new-brand"
              ;;
            "23 * * * *")
              GROUP="TGIF"
              ;;
            "43 * * * *")
              GROUP="TXRH"
              ;;
            *)
              GROUP="new-brand"
              ;;
          esac

          echo "DASHBOARD_GROUP=$GROUP" >> "$GITHUB_ENV"
          echo "Using scheduled dashboard group: $GROUP"
          echo "Matched schedule: $EVENT_SCHEDULE"

          mkdir -p public
          mkdir -p "public/$GROUP"

          test -f "public/$GROUP/comments.json" || printf '[]\n' > "public/$GROUP/comments.json"
          test -f "public/$GROUP/review-versions.json" || printf '[]\n' > "public/$GROUP/review-versions.json"
          test -f "public/$GROUP/notified-review-ids.json" || printf '[]\n' > "public/$GROUP/notified-review-ids.json"

          cp "public/$GROUP/comments.json" public/comments.json
          cp "public/$GROUP/review-versions.json" public/review-versions.json
          cp "public/$GROUP/notified-review-ids.json" public/notified-review-ids.json

      - name: Scheduled sync Google reviews
        if: ${{ github.event_name == 'schedule' }}
        run: npm run sync:static
        env:
          NODE_ENV: production
          PUPPETEER_SKIP_DOWNLOAD: true
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          SCRAPE_MAX_ROUNDS: "5"
          SCRAPE_TARGET_BRAND: "all"
          SCRAPE_TARGET_STORE: "all"

      - name: Scheduled send notifications
        if: ${{ github.event_name == 'schedule' }}
        run: npm run notify:push
        env:
          DASHBOARD_GROUP: ${{ env.DASHBOARD_GROUP }}
          SCRAPE_MAX_ROUNDS: "5"

          WORKER_URL: https://dry-butterfly-33.zxcvb2282.workers.dev
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: mailto:zxcvb282@gmail.com

          O365_SMTP_HOST: ${{ secrets.O365_SMTP_HOST }}
          O365_SMTP_PORT: ${{ secrets.O365_SMTP_PORT }}
          O365_SMTP_USER: ${{ secrets.O365_SMTP_USER }}
          O365_SMTP_PASS: ${{ secrets.O365_SMTP_PASS }}

          O365_NOTIFY_TO: ${{ secrets.O365_NOTIFY_TO }}
          O365_NOTIFY_TO_NEW_BRAND: ${{ secrets.O365_NOTIFY_TO_NEW_BRAND }}
          O365_NOTIFY_TO_TGIF: ${{ secrets.O365_NOTIFY_TO_TGIF }}
          O365_NOTIFY_TO_TXRH: ${{ secrets.O365_NOTIFY_TO_TXRH }}

      - name: Commit scheduled updated JSON
        if: ${{ github.event_name == 'schedule' }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          GROUP="${DASHBOARD_GROUP:-new-brand}"

          case "$GROUP" in
            new-brand|TGIF|TXRH)
              ;;
            *)
              GROUP="new-brand"
              ;;
          esac

          echo "Commit scheduled dashboard group: $GROUP"

          mkdir -p public
          test -f public/comments.json || printf '[]\n' > public/comments.json
          test -f public/review-versions.json || printf '[]\n' > public/review-versions.json
          test -f public/notified-review-ids.json || printf '[]\n' > public/notified-review-ids.json

          cp public/comments.json /tmp/comments.json
          cp public/review-versions.json /tmp/review-versions.json
          cp public/notified-review-ids.json /tmp/notified-review-ids.json

          git fetch origin main
          git reset --hard origin/main

          mkdir -p "public/$GROUP"

          cp /tmp/comments.json "public/$GROUP/comments.json"
          cp /tmp/review-versions.json "public/$GROUP/review-versions.json"
          cp /tmp/notified-review-ids.json "public/$GROUP/notified-review-ids.json"

          git add \
            "public/$GROUP/comments.json" \
            "public/$GROUP/review-versions.json" \
            "public/$GROUP/notified-review-ids.json"

          if git diff --cached --quiet; then
            echo "No scheduled JSON changes to commit"
          else
            git commit -m "auto scheduled sync reviews for $GROUP"
            git push origin HEAD:main
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4