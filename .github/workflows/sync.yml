name: Sync Google Reviews

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "public/comments.json"
      - "public/review-versions.json"
      - "public/notified-review-ids.json"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Sync Google reviews
        run: npm run sync:static
        env:
          NODE_ENV: production

      - name: Send push notifications
        run: npm run notify:push
        env:
          WORKER_URL: https://dry-butterfly-33.zxcvb2282.workers.dev
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: mailto:zxcvb282@gmail.com

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if [ ! -f public/notified-review-ids.json ]; then
            echo "[]" > public/notified-review-ids.json
          fi

          git add public/comments.json public/review-versions.json public/notified-review-ids.json
          git commit -m "auto sync reviews" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4