name: Sync Google Reviews

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "public/comments.json"
      - "public/review-versions.json"
      - "public/notified-review-ids.json"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2t64 \
            libpango-1.0-0 \
            libcairo2 \
            libx11-xcb1 \
            libxcb1 \
            libxss1 \
            libxtst6 \
            fonts-liberation \
            xdg-utils

      - name: Install dependencies
        env:
          PUPPETEER_CACHE_DIR: /home/runner/.cache/puppeteer
        run: |
          npm install
          npx puppeteer browsers install chrome

      - name: Check installed Chrome
        env:
          PUPPETEER_CACHE_DIR: /home/runner/.cache/puppeteer
        run: |
          echo "PUPPETEER_CACHE_DIR=$PUPPETEER_CACHE_DIR"
          ls -R /home/runner/.cache/puppeteer || true

      - name: Sync Google reviews
        run: npm run sync:static
        env:
          NODE_ENV: production
          PUPPETEER_CACHE_DIR: /home/runner/.cache/puppeteer

      - name: Send push notifications
        run: npm run notify:push
        env:
          WORKER_URL: https://dry-butterfly-33.zxcvb2282.workers.dev
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: mailto:zxcvb282@gmail.com

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          mkdir -p public
          test -f public/comments.json || printf '[]\n' > public/comments.json
          test -f public/review-versions.json || printf '[]\n' > public/review-versions.json
          test -f public/notified-review-ids.json || printf '[]\n' > public/notified-review-ids.json

          git add public/comments.json public/review-versions.json public/notified-review-ids.json

          if git diff --cached --quiet; then
            echo "No JSON changes to commit"
          else
            git commit -m "auto sync reviews"
            git push origin HEAD:main
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4